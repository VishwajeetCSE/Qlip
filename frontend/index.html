<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QlipPro - Advanced Clone</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
    <div class="pro-phone-shell">
        <div class="app-container">
            <header class="top-bar">
                <div class="logo-wrapper">
                    <div class="logo-container" onclick="toggleModeMenu()">
                        <span class="logo">QlipPro</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                    <div id="mode-menu" class="mode-dropdown">
                        <div class="mode-item" onclick="selectMode('Random')">Random</div>
                        <div class="mode-item" onclick="selectMode('Study')">Study</div>
                        <div class="mode-item" onclick="selectMode('Tech')">Tech</div>
                    </div>
                </div>
                <div class="header-icons">
                    <i class="far fa-heart"></i>
                    <i class="fab fa-facebook-messenger"></i>
                </div>
            </header>

            <div class="story-bar">
                <div class="story">
                    <div class="circle yours"><i class="fas fa-plus"></i></div><span>You</span>
                </div>
                <div class="story">
                    <div class="circle"></div><span>User1</span>
                </div>
                <div class="story">
                    <div class="circle"></div><span>User2</span>
                </div>
            </div>

            <main class="reels-feed" id="reels-container">
                <div class="loading">Loading Qlips...</div>
            </main>

            <nav class="bottom-bar">
                <i class="fas fa-home active"></i>
                <i class="fas fa-search"></i>
                <div class="upload-btn"><i class="fas fa-plus"></i></div>
                <i class="fas fa-clapperboard"></i>
                <div class="nav-profile"></div>
            </nav>
        </div>
    </div>

    <script src="js/app.js" defer></script>
</body>

</html>
